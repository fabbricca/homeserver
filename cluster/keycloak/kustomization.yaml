apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: keycloak
# Shared Keycloak identity provider.
# Tenant isolation is done at the realm level:
#   each platform gets its own realm, keeping users/clients/sessions fully separated.
#
# Public URL: https://keycloak.iberu.me
# Register this site in Pangolin's admin UI pointing to the Newt tunnel → nginx ingress.
#
# The current image (fabbricca/studybuddy-keycloak) bundles the studybuddy realm.
# When adding a new platform, bake its realm JSON into the image or use a separate image.
resources:
  - pvc.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
commonLabels:
  app.kubernetes.io/managed-by: flux
