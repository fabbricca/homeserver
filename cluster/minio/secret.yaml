apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: minio
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: storage
type: Opaque
stringData:
  # Root admin credentials – used for provisioning only, never exposed to tenant apps.
  # Tenant apps each get a dedicated IAM user scoped to their own bucket.
  MINIO_ROOT_USER: admin
  MINIO_ROOT_PASSWORD: CHANGE_ME_minio_root_password
