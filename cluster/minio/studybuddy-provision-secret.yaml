apiVersion: v1
kind: Secret
metadata:
  name: minio-studybuddy-provision
  namespace: minio
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: storage
type: Opaque
stringData:
  # studybuddy IAM user credentials.
  # These MUST match the values in cluster/studybuddy/api-secret.yaml.
  MINIO_STUDYBUDDY_ACCESS_KEY: studybuddy
  MINIO_STUDYBUDDY_SECRET_KEY: CHANGE_ME_minio_studybuddy_password
