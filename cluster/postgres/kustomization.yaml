apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: postgres
# Shared PostgreSQL (pgvector) instance.
# Tenant isolation is done at the database + user level:
#   each platform gets its own DB and user provisioned via initdb scripts.
# The pgvector extension is available cluster-wide so any DB can enable it.
resources:
  - pvc.yaml
  - secret.yaml
  - initdb-configmap.yaml
  - deployment.yaml
  - service.yaml
commonLabels:
  app.kubernetes.io/managed-by: flux
