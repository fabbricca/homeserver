apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
type: Opaque
stringData:
  # Root superuser – used by initdb scripts only, never exposed to tenant apps
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: CHANGE_ME_postgres_root_password
  POSTGRES_DB: postgres
