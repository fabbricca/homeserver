apiVersion: apps/v1
kind: Deployment
metadata:
  name: studybuddy-teacher
  namespace: studybuddy
  labels:
    app.kubernetes.io/name: studybuddy-teacher
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: studybuddy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: studybuddy-teacher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: studybuddy-teacher
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: studybuddy
    spec:
      containers:
        - name: studybuddy-teacher
          # Teacher worker – generates lesson content (intro, guide, checklist) via RAG + LLM
          # Build: docker build -t fabbricca/studybuddy-teacher:latest -f workers/teacher/Dockerfile .
          image: fabbricca/studybuddy-teacher:latest
          imagePullPolicy: Always
          env:
            - name: NATS_URL
              value: "nats://studybuddy-nats:4222"
            - name: OLLAMA_BASE_URL
              value: "http://10.0.0.15:11434"
            - name: OLLAMA_MODEL
              value: "phi4-reasoning:plus"
            - name: DATABASE_URL
              value: "postgresql://studybuddy_app:CHANGE_ME_studybuddy_db_password@postgres.postgres.svc.cluster.local:5432/studybuddy"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      restartPolicy: Always
