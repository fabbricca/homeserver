apiVersion: apps/v1
kind: Deployment
metadata:
  name: studybuddy-teacher
  namespace: studybuddy
  labels:
    app.kubernetes.io/name: studybuddy-teacher
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: studybuddy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: studybuddy-teacher
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-03-22T00:00:00Z"
      labels:
        app.kubernetes.io/name: studybuddy-teacher
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: studybuddy
    spec:
      containers:
        - name: studybuddy-teacher
          # Teacher worker – generates lesson content (intro, guide, checklist) via RAG + LLM
          # Build: docker build -t fabbricca/studybuddy-teacher:latest -f workers/teacher/Dockerfile .
          image: fabbricca/studybuddy-teacher:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: studybuddy-api-config
            - secretRef:
                name: studybuddy-api-secret
            - secretRef:
                name: studybuddy-groq-secret
          env:
            - name: NATS_URL
              value: "nats://studybuddy-nats:4222"
            - name: OLLAMA_BASE_URL
              value: "http://10.0.0.15:11434"
            - name: OLLAMA_MODEL
              value: "gemma3:12b"
            - name: LLM_PROVIDER
              value: "groq"
            - name: LLM_BASE_URL
              value: "https://api.groq.com/openai/v1"
            - name: LLM_MODEL
              value: "llama-3.3-70b-versatile"
            - name: EMBED_MODEL
              value: "mxbai-embed-large"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      restartPolicy: Always
