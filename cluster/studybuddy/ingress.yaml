apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: studybuddy-ingress
  namespace: studybuddy
  labels:
    app.kubernetes.io/name: studybuddy
    app.kubernetes.io/part-of: studybuddy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Allow up to 25 MB uploads (matching Fastify multipart limit)
    nginx.ingress.kubernetes.io/proxy-body-size: "30m"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - studybuddy.iberu.me
      secretName: studybuddy-tls
  rules:
    - host: studybuddy.iberu.me
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: studybuddy-api
                port:
                  number: 3000
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: studybuddy-api
                port:
                  number: 3000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: studybuddy-api
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: studybuddy-web
                port:
                  number: 80
