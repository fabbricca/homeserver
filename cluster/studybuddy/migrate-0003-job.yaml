apiVersion: batch/v1
kind: Job
metadata:
  name: studybuddy-migrate-0003
  namespace: studybuddy
  labels:
    app.kubernetes.io/name: studybuddy-migrate
    app.kubernetes.io/component: migration
    app.kubernetes.io/part-of: studybuddy
  annotations:
    # Re-run this job manually if needed:
    #   kubectl delete job studybuddy-migrate-0003 -n studybuddy
    # Flux will recreate it on the next reconcile.
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              set -e
              psql "$DATABASE_URL" <<SQL
              ALTER TABLE classes ADD COLUMN IF NOT EXISTS plan_locked BOOLEAN NOT NULL DEFAULT FALSE;
              UPDATE classes SET plan_locked = TRUE
              WHERE class_id IN (SELECT DISTINCT class_id FROM plans UNION SELECT DISTINCT class_id FROM lessons);
              SQL
              echo "Migration 0003_plan_locked complete."
          envFrom:
            - configMapRef:
                name: studybuddy-api-config
            - secretRef:
                name: studybuddy-api-secret
