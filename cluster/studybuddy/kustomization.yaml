apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: studybuddy
# ── Pangolin / Newt network topology ──────────────────────────────────────────
# All external traffic flows: Browser → Pangolin (Oracle VM, TLS termination)
#   → Newt tunnel → nginx ingress controller → service
# No LoadBalancer IPs are exposed directly; everything routes through nginx ingress.
#
# Before deploying, register this site in Pangolin's admin UI:
#   • studybuddy.iberu.me
#
# Shared infrastructure (separate namespaces, deployed independently):
#   • Postgres  → cluster/postgres/  (postgres.postgres.svc.cluster.local:5432)
#   • MinIO     → cluster/minio/     (minio.minio.svc.cluster.local:9000)
#   • Keycloak  → cluster/keycloak/  (keycloak.keycloak.svc.cluster.local:8080)
# ──────────────────────────────────────────────────────────────────────────────
resources:
  # NATS JetStream – studybuddy-internal event bus (not shared)
  - nats-pvc.yaml
  - nats-deployment.yaml
  - nats-service.yaml
  # API (Fastify)
  - api-configmap.yaml
  - api-secret.yaml
  - groq-secret.yaml
  - api-deployment.yaml
  - api-service.yaml
  # Node.js services (no HTTP port – NATS consumers only)
  - orchestrator-deployment.yaml
  - projector-deployment.yaml
  # Python AI workers (NATS consumers, Ollama GPU at 10.0.0.15, Groq LLM)
  # NOTE: Ollama needs gemma3:12b AND mxbai-embed-large loaded
  - rag-deployment.yaml
  - planner-deployment.yaml
  - teacher-deployment.yaml
  # Web frontend
  - web-deployment.yaml
  - web-service.yaml
  # Ingress (main domain)
  - ingress.yaml
commonLabels:
  app.kubernetes.io/managed-by: flux
