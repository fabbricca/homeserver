apiVersion: apps/v1
kind: Deployment
metadata:
  name: studybuddy-projector
  namespace: studybuddy
  labels:
    app.kubernetes.io/name: studybuddy-projector
    app.kubernetes.io/component: projector
    app.kubernetes.io/part-of: studybuddy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: studybuddy-projector
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-03-29T10:19:41Z"
      labels:
        app.kubernetes.io/name: studybuddy-projector
        app.kubernetes.io/component: projector
        app.kubernetes.io/part-of: studybuddy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: studybuddy-projector
          # Event projector – writes all evt.* events to Postgres, no HTTP port
          # Build: docker build -t fabbricca/studybuddy-projector:latest -f services/projector/Dockerfile .
          image: fabbricca/studybuddy-projector:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          envFrom:
            - configMapRef:
                name: studybuddy-api-config
          env:
            - name: NATS_URL
              value: "nats://studybuddy-nats:4222"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      restartPolicy: Always
