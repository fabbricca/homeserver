apiVersion: apps/v1
kind: Deployment
metadata:
  name: studybuddy-planner
  namespace: studybuddy
  labels:
    app.kubernetes.io/name: studybuddy-planner
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: studybuddy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: studybuddy-planner
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-03-10T00:00:00Z"
      labels:
        app.kubernetes.io/name: studybuddy-planner
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: studybuddy
    spec:
      containers:
        - name: studybuddy-planner
          # Planner worker – generates structured study plans via LLM
          # Build: docker build -t fabbricca/studybuddy-planner:latest -f workers/planner/Dockerfile .
          image: fabbricca/studybuddy-planner:latest
          imagePullPolicy: Always
          env:
            - name: NATS_URL
              value: "nats://studybuddy-nats:4222"
            - name: OLLAMA_BASE_URL
              value: "http://10.0.0.15:11434"
            - name: OLLAMA_MODEL
              value: "gemma3:12b"
          envFrom:
            - configMapRef:
                name: studybuddy-api-config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      restartPolicy: Always
