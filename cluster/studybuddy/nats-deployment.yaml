apiVersion: apps/v1
kind: Deployment
metadata:
  name: studybuddy-nats
  namespace: studybuddy
  labels:
    app.kubernetes.io/name: studybuddy-nats
    app.kubernetes.io/component: messaging
    app.kubernetes.io/part-of: studybuddy
spec:
  replicas: 1
  minReadySeconds: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: studybuddy-nats
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-03-29T10:19:41Z"
      labels:
        app.kubernetes.io/name: studybuddy-nats
        app.kubernetes.io/component: messaging
        app.kubernetes.io/part-of: studybuddy
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: nats
          image: nats@sha256:7e2f895a12d5bc4586191452f5dd20968e8c800d53622073a2730c38d6b0eccb
          imagePullPolicy: IfNotPresent
          # -js: enable JetStream (required for durable consumers / event streams)
          # -sd: store JetStream data on the PVC
          # -m: enable monitoring port
          args: ["-js", "-sd", "/data", "-m", "8222"]
          ports:
            - name: client
              containerPort: 4222
              protocol: TCP
            - name: monitor
              containerPort: 8222
              protocol: TCP
          volumeMounts:
            - name: nats-data
              mountPath: /data
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          startupProbe:
            httpGet:
              path: /healthz
              port: monitor
            periodSeconds: 2
            failureThreshold: 45
            timeoutSeconds: 1
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: nats-data
          persistentVolumeClaim:
            claimName: studybuddy-nats-data
