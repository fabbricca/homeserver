apiVersion: apps/v1
kind: Deployment
metadata:
  name: studybuddy-nats
  namespace: studybuddy
  labels:
    app.kubernetes.io/name: studybuddy-nats
    app.kubernetes.io/component: messaging
    app.kubernetes.io/part-of: studybuddy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: studybuddy-nats
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-03-19T00:00:00Z"
      labels:
        app.kubernetes.io/name: studybuddy-nats
        app.kubernetes.io/component: messaging
        app.kubernetes.io/part-of: studybuddy
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          imagePullPolicy: IfNotPresent
          # -js: enable JetStream (required for durable consumers / event streams)
          # -sd: store JetStream data on the PVC
          # -m: enable monitoring port
          args: ["-js", "-sd", "/data", "-m", "8222"]
          ports:
            - name: client
              containerPort: 4222
              protocol: TCP
            - name: monitor
              containerPort: 8222
              protocol: TCP
          volumeMounts:
            - name: nats-data
              mountPath: /data
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: nats-data
          persistentVolumeClaim:
            claimName: studybuddy-nats-data
