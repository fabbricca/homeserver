apiVersion: v1
kind: Secret
metadata:
  name: studybuddy-api-secret
  namespace: studybuddy
  labels:
    app.kubernetes.io/name: studybuddy-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: studybuddy
type: Opaque
stringData:
  # studybuddy-scoped MinIO IAM user (provisioned by cluster/minio/studybuddy-provision-job.yaml)
  # MUST match MINIO_STUDYBUDDY_ACCESS_KEY / MINIO_STUDYBUDDY_SECRET_KEY in that job's secret.
  MINIO_ACCESS_KEY: studybuddy
  MINIO_SECRET_KEY: CHANGE_ME_minio_studybuddy_password
