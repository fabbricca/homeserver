apiVersion: apps/v1
kind: Deployment
metadata:
  name: studybuddy-rag
  namespace: studybuddy
  labels:
    app.kubernetes.io/name: studybuddy-rag
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: studybuddy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: studybuddy-rag
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-03-29T10:19:41Z"
      labels:
        app.kubernetes.io/name: studybuddy-rag
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: studybuddy
    spec:
      containers:
        - name: studybuddy-rag
          # RAG worker – extracts, chunks, embeds documents; stores vectors in pgvector
          # Build: docker build -t fabbricca/studybuddy-rag:latest -f workers/rag/Dockerfile .
          #
          # IMPORTANT: This worker uses Ollama on 10.0.0.15 for embeddings
          #   and Groq (or configurable LLM_PROVIDER) for summarization/topic extraction.
          #   - EMBED_MODEL (mxbai-embed-large): for vector embeddings (1024 dims)
          # Ensure the embedding model is pulled on the GPU server before deploying.
          image: fabbricca/studybuddy-rag@sha256:358f34d5a974f19b8ed468555c99137d6ad9313fe888adc736033b16eebac513
          imagePullPolicy: Always
          env:
            - name: NATS_URL
              value: "nats://studybuddy-nats:4222"
            - name: OLLAMA_BASE_URL
              value: "http://10.0.0.15:11434"
            - name: OLLAMA_MODEL
              value: "gemma3:12b"
            - name: LLM_PROVIDER
              value: "groq"
            - name: LLM_BASE_URL
              value: "https://api.groq.com/openai/v1"
            - name: LLM_MODEL
              value: "llama-3.3-70b-versatile"
            - name: EMBED_MODEL
              value: "mxbai-embed-large"
            - name: MINIO_ENDPOINT
              value: "minio.minio.svc.cluster.local"
            - name: MINIO_PORT
              value: "9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: studybuddy-api-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: studybuddy-api-secret
                  key: MINIO_SECRET_KEY
            - name: MINIO_BUCKET
              value: "studybuddy"
          envFrom:
            - configMapRef:
                name: studybuddy-api-config
            - secretRef:
                name: studybuddy-groq-secret
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      restartPolicy: Always
