apiVersion: apps/v1
kind: Deployment
metadata:
  name: studybuddy-rag
  namespace: studybuddy
  labels:
    app.kubernetes.io/name: studybuddy-rag
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: studybuddy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: studybuddy-rag
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-03-10T00:00:00Z"
      labels:
        app.kubernetes.io/name: studybuddy-rag
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: studybuddy
    spec:
      containers:
        - name: studybuddy-rag
          # RAG worker – extracts, chunks, embeds documents; stores vectors in pgvector
          # Build: docker build -t fabbricca/studybuddy-rag:latest -f workers/rag/Dockerfile .
          #
          # IMPORTANT: This worker uses TWO Ollama models on 10.0.0.15:
          #   - OLLAMA_MODEL (gemma3:12b): for summarization and topic extraction
          #   - nomic-embed-text (hardcoded in embedder.py): for vector embeddings (768 dims)
          # Ensure both models are pulled on the GPU server before deploying.
          image: fabbricca/studybuddy-rag:latest
          imagePullPolicy: Always
          env:
            - name: NATS_URL
              value: "nats://studybuddy-nats:4222"
            - name: OLLAMA_BASE_URL
              value: "http://10.0.0.15:11434"
            - name: OLLAMA_MODEL
              value: "gemma3:12b"
            - name: MINIO_ENDPOINT
              value: "minio.minio.svc.cluster.local"
            - name: MINIO_PORT
              value: "9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: studybuddy-api-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: studybuddy-api-secret
                  key: MINIO_SECRET_KEY
            - name: MINIO_BUCKET
              value: "studybuddy"
          envFrom:
            - configMapRef:
                name: studybuddy-api-config
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      restartPolicy: Always
